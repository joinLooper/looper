name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm db:migrate
        env:
          LOOPER_DATABASE_PATH: ${{ runner.temp }}/looper-test.sqlite
      - name: Lint shared packages
        run: |
          pnpm --filter @looper/ui lint
          pnpm --filter @looper/types lint
          pnpm --filter @looper/config lint
          pnpm --filter @looper/utils lint
          pnpm --filter @looper/constants lint
      - name: Lint API
        shell: bash
        run: |
          set +e
          pnpm --filter @looper/api lint > api-lint.log 2>&1
          status=$?
          cat api-lint.log
          exit $status
      - name: Upload API lint log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-lint-log
          path: api-lint.log
      - name: Lint Web
        run: pnpm --filter @looper/web lint
      - name: Lint Admin
        run: pnpm --filter @looper/admin lint
      - name: Lint Merchant
        run: pnpm --filter @looper/merchant lint
      - run: pnpm typecheck
      - name: Verify complete MVP flow
        run: pnpm test:mvp
        env:
          LOOPER_DATABASE_PATH: ${{ runner.temp }}/looper-test.sqlite
      - name: Build shared packages
        run: |
          pnpm --filter @looper/ui build
          pnpm --filter @looper/types build
          pnpm --filter @looper/config build
          pnpm --filter @looper/utils build
          pnpm --filter @looper/constants build
      - name: Build API
        run: pnpm --filter @looper/api build
      - name: Build Web
        run: pnpm --filter @looper/web build
      - name: Build Admin
        run: pnpm --filter @looper/admin build
      - name: Build Merchant
        run: pnpm --filter @looper/merchant build
      - name: Verify root build
        run: pnpm build
