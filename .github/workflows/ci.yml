name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - name: Lint shared packages
        run: |
          pnpm --filter @looper/ui lint
          pnpm --filter @looper/types lint
          pnpm --filter @looper/config lint
          pnpm --filter @looper/utils lint
          pnpm --filter @looper/constants lint
      - name: Lint API
        run: pnpm --filter @looper/api lint
      - name: Lint Web
        run: pnpm --filter @looper/web lint
      - name: Lint Admin
        run: pnpm --filter @looper/admin lint
      - name: Lint Merchant
        run: pnpm --filter @looper/merchant lint
      - run: pnpm typecheck
      - name: Build shared packages
        run: |
          pnpm --filter @looper/ui build
          pnpm --filter @looper/types build
          pnpm --filter @looper/config build
          pnpm --filter @looper/utils build
          pnpm --filter @looper/constants build
      - name: Build API
        run: pnpm --filter @looper/api build
      - name: Build Web
        run: pnpm --filter @looper/web build
      - name: Build Admin
        run: pnpm --filter @looper/admin build
      - name: Build Merchant
        run: pnpm --filter @looper/merchant build
      - name: Verify root build
        run: pnpm build
