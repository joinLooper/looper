name: Backend Tests

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "packages/types/**"
      - ".github/workflows/backend-tests.yml"
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/types/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @looper/api test
